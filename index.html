<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>El Pollo Loco ULTIMATE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  #game { display: block; width: 100vw; height: 100vh; background: #000; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
"use strict";
/* ============================================================================
   EL POLLO LOCO ULTIMATE  —  single-file HTML5 canvas game
   Virtual world: 1280x720 (16:9). Scaled to fit with letterboxing.
   All timings in milliseconds. Everything procedural (graphics + audio).
   ========================================================================== */

(function () {

/* ----------------------------- Constants -------------------------------- */
const WORLD_W = 1280;
const WORLD_H = 720;
const GRAVITY = 0.0026;          // px per ms^2
const DT_CAP = 50;               // ms

const STATE = {
  MENU: "MENU", PLAYING: "PLAYING", PAUSED: "PAUSED",
  SHOP: "SHOP", GAMEOVER: "GAMEOVER", VICTORY: "VICTORY"
};

/* ----------------------------- Utilities -------------------------------- */
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
const lerp = (a, b, t) => a + (b - a) * t;
function rand(a, b) { return a + Math.random() * (b - a); }
function randi(a, b) { return Math.floor(rand(a, b + 1)); }
function dist(ax, ay, bx, by) { const dx = ax - bx, dy = ay - by; return Math.sqrt(dx * dx + dy * dy); }

// AABB with 10% shrink to avoid false positives
function aabb(a, b) {
  const sx = a.w * 0.1, sy = a.h * 0.1;
  const sx2 = b.w * 0.1, sy2 = b.h * 0.1;
  return (a.x + sx) < (b.x + b.w - sx2) &&
         (a.x + a.w - sx) > (b.x + sx2) &&
         (a.y + sy) < (b.y + b.h - sy2) &&
         (a.y + a.h - sy) > (b.y + sy2);
}

function safe(fn, label) {
  try { return fn(); }
  catch (e) { console.warn("[caught" + (label ? ":" + label : "") + "]", e); return undefined; }
}

/* ----------------------------- Storage ---------------------------------- */
const Store = {
  get(key, def) {
    return safe(() => {
      const v = localStorage.getItem("epl_" + key);
      return v === null ? def : JSON.parse(v);
    }, "store.get") ?? def;
  },
  set(key, val) {
    safe(() => localStorage.setItem("epl_" + key, JSON.stringify(val)), "store.set");
  }
};

/* ----------------------------- Audio ------------------------------------ */
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.master = null;
    this.musicGain = null;
    this.enabled = true;
    this.musicTimer = 0;
    this.musicStep = 0;
    this.bpmMul = 1;
    this.musicScale = null;
    this.musicNodes = [];
  }
  init() {
    if (this.ctx) return;
    safe(() => {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) { this.enabled = false; return; }
      this.ctx = new AC();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.35;
      this.master.connect(this.ctx.destination);
      this.musicGain = this.ctx.createGain();
      this.musicGain.gain.value = 0.12;
      this.musicGain.connect(this.master);
    }, "audio.init");
  }
  resume() { if (this.ctx && this.ctx.state === "suspended") safe(() => this.ctx.resume(), "audio.resume"); }
  now() { return this.ctx ? this.ctx.currentTime : 0; }

  tone(freq, dur, type, gain, slideTo) {
    if (!this.enabled || !this.ctx) return;
    safe(() => {
      const t = this.now();
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.type = type || "sine";
      o.frequency.setValueAtTime(freq, t);
      if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t + dur);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(gain || 0.2, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g); g.connect(this.master);
      o.start(t); o.stop(t + dur + 0.02);
    }, "audio.tone");
  }
  noise(dur, gain) {
    if (!this.enabled || !this.ctx) return;
    safe(() => {
      const t = this.now();
      const n = Math.floor(this.ctx.sampleRate * dur);
      const buf = this.ctx.createBuffer(1, n, this.ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
      const src = this.ctx.createBufferSource();
      src.buffer = buf;
      const g = this.ctx.createGain();
      g.gain.value = gain || 0.3;
      const f = this.ctx.createBiquadFilter();
      f.type = "bandpass"; f.frequency.value = 1200;
      src.connect(f); f.connect(g); g.connect(this.master);
      src.start(t);
    }, "audio.noise");
  }
  jump()  { this.tone(220, 0.12, "square", 0.18, 440); }
  coin(p) { this.tone(880 + (p || 0) * 60, 0.06, "triangle", 0.18, 1320); }
  combo() { this.tone(660, 0.08, "triangle", 0.2, 990); }
  hurt()  { this.noise(0.2, 0.35); this.tone(160, 0.18, "sawtooth", 0.2, 60); }
  bossShoot() { this.tone(80, 0.3, "sawtooth", 0.25, 40); }
  bossHit() { this.noise(0.12, 0.25); this.tone(300, 0.1, "square", 0.2, 120); }
  comboBreak() { this.tone(300, 0.2, "sawtooth", 0.2, 90); }
  explosion() { this.noise(0.35, 0.4); this.tone(120, 0.3, "sawtooth", 0.25, 40); }
  powerup() { this.tone(523, 0.08, "triangle", 0.2); setTimeout(() => this.tone(784, 0.12, "triangle", 0.2), 80); }
  buy() { this.tone(440, 0.06, "square", 0.2, 660); setTimeout(() => this.tone(880, 0.1, "square", 0.2), 60); }
  gameOver() {
    [523, 440, 349, 261].forEach((f, i) => setTimeout(() => this.tone(f, 0.3, "sawtooth", 0.22), i * 200));
  }
  victory() {
    [392, 523, 659, 784, 1046].forEach((f, i) => setTimeout(() => this.tone(f, 0.25, "triangle", 0.25), i * 130));
  }
  setMusic(level) {
    // Level scales
    if (level === 1) this.musicScale = [261, 329, 392, 523, 392, 329];       // C major-ish, fröhlich
    else if (level === 2) this.musicScale = [261, 311, 349, 415, 349, 311];  // minor, bedrohlich
    else this.musicScale = [196, 261, 293, 349, 392, 466, 392, 293];          // episch
    this.bpmMul = 1;
    this.musicStep = 0;
    this.musicTimer = 0;
  }
  updateMusic(dt) {
    if (!this.enabled || !this.ctx || !this.musicScale) return;
    this.musicTimer -= dt;
    const interval = 320 / this.bpmMul;
    if (this.musicTimer <= 0) {
      this.musicTimer = interval;
      const f = this.musicScale[this.musicStep % this.musicScale.length];
      this.tone(f, interval / 1000 * 0.9, "triangle", 0.06);
      // percussion layer for phase 3 (bpmMul high)
      if (this.bpmMul >= 1.7 && this.musicStep % 2 === 0) this.noise(0.05, 0.08);
      this.musicStep++;
    }
  }
  stopMusic() { this.musicScale = null; }
}
const Audio = new AudioEngine();

/* ----------------------------- Input ------------------------------------ */
const Input = {
  keys: {},
  left: false, right: false, jump: false, jumpPressed: false, dash: false, dashPressed: false,
  _prevJump: false, _prevDash: false,
  touchButtons: [], // filled by HUD
  init(canvas) {
    window.addEventListener("keydown", (e) => {
      Audio.resume();
      this.keys[e.code] = true;
      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"].includes(e.code)) e.preventDefault();
    }, { passive: false });
    window.addEventListener("keyup", (e) => { this.keys[e.code] = false; });
    window.addEventListener("blur", () => { this.keys = {}; });
  },
  update() {
    const k = this.keys;
    const kbLeft = k["ArrowLeft"] || k["KeyA"];
    const kbRight = k["ArrowRight"] || k["KeyD"];
    const kbJump = k["ArrowUp"] || k["KeyW"] || k["Space"];
    const kbDash = k["ShiftLeft"] || k["ShiftRight"] || k["KeyK"];
    // merge keyboard + touch flags
    this.left = kbLeft || this._tLeft;
    this.right = kbRight || this._tRight;
    const jumpNow = kbJump || this._tJump;
    const dashNow = kbDash || this._tDash;
    this.jumpPressed = jumpNow && !this._prevJump;
    this.dashPressed = dashNow && !this._prevDash;
    this.jump = jumpNow;
    this.dash = dashNow;
    this._prevJump = jumpNow;
    this._prevDash = dashNow;
  },
  _tLeft: false, _tRight: false, _tJump: false, _tDash: false
};

/* ----------------------------- Particles -------------------------------- */
class Particle {
  constructor() { this.active = false; }
  spawn(x, y, vx, vy, life, color, size, gravity, fade) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.life = life; this.maxLife = life; this.color = color;
    this.size = size; this.gravity = gravity || 0; this.fade = fade !== false;
    this.active = true;
  }
  update(dt) {
    if (!this.active) return;
    this.life -= dt;
    if (this.life <= 0) { this.active = false; return; }
    this.vy += this.gravity * dt;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
  }
  draw(ctx) {
    if (!this.active) return;
    const a = this.fade ? clamp(this.life / this.maxLife, 0, 1) : 1;
    ctx.globalAlpha = a;
    ctx.fillStyle = this.color;
    const s = this.size * (this.fade ? (0.5 + a * 0.5) : 1);
    ctx.fillRect(this.x - s / 2, this.y - s / 2, s, s);
    ctx.globalAlpha = 1;
  }
}
class ParticleSystem {
  constructor(max) {
    this.max = max || 200;
    this.pool = [];
    for (let i = 0; i < this.max; i++) this.pool.push(new Particle());
  }
  emit(opts) {
    let spawned = 0;
    for (let i = 0; i < this.max && spawned < opts.count; i++) {
      if (!this.pool[i].active) {
        const ang = opts.angle != null ? opts.angle + rand(-opts.spread, opts.spread) : rand(0, Math.PI * 2);
        const spd = rand(opts.speedMin, opts.speedMax);
        this.pool[i].spawn(
          opts.x, opts.y,
          Math.cos(ang) * spd, Math.sin(ang) * spd,
          rand(opts.lifeMin, opts.lifeMax),
          typeof opts.color === "function" ? opts.color() : opts.color,
          rand(opts.sizeMin, opts.sizeMax),
          opts.gravity || 0, opts.fade
        );
        spawned++;
      }
    }
  }
  update(dt) { for (const p of this.pool) p.update(dt); }
  draw(ctx) { for (const p of this.pool) p.draw(ctx); }
  clear() { for (const p of this.pool) p.active = false; }
}

/* ----------------------------- Camera shake ----------------------------- */
const Shake = {
  t: 0, mag: 0,
  add(ms, mag) { this.t = Math.max(this.t, ms); this.mag = Math.max(this.mag, mag); },
  update(dt) { if (this.t > 0) { this.t -= dt; if (this.t <= 0) this.mag = 0; } },
  get x() { return this.t > 0 ? rand(-this.mag, this.mag) : 0; },
  get y() { return this.t > 0 ? rand(-this.mag, this.mag) : 0; }
};

/* ----------------------------- Platform --------------------------------- */
class Platform {
  constructor(x, y, w, h, opts) {
    opts = opts || {};
    this.x = x; this.y = y; this.w = w; this.h = h;
    this.baseX = x; this.baseY = y;
    this.moving = !!opts.moving;
    this.phase = rand(0, Math.PI * 2);
    this.falling = !!opts.falling;        // L2 crumbling
    this.fallTimer = -1; this.fallen = false; this.fy = 0; this.fvy = 0;
    this.color = opts.color || "#8a5a2b";
    this.edge = opts.color2 || "#6b4420";
    this.standing = false;
  }
  get alive() { return !this.fallen || this.fy < WORLD_H + 200; }
  isAlive() { return this.alive; }
  triggerFall() { if (this.falling && this.fallTimer < 0) this.fallTimer = 2000; }
  update(dt) {
    if (this.moving) {
      this.phase += dt * 0.002;
      this.x = this.baseX + Math.sin(this.phase) * 30;
      this.y = this.baseY + Math.sin(this.phase * 0.8) * 5;
    }
    if (this.fallTimer > 0) {
      this.fallTimer -= dt;
      if (this.fallTimer <= 0) this.fallen = true;
    }
    if (this.fallen) {
      this.fvy += GRAVITY * dt;
      this.fy += this.fvy * dt;
      this.y = this.baseY + this.fy;
    }
  }
  draw(ctx) {
    const shaky = this.fallTimer > 0 && this.fallTimer < 2000;
    const ox = shaky ? rand(-1.5, 1.5) : 0;
    ctx.save();
    ctx.translate(ox, 0);
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x, this.y, this.w, this.h);
    ctx.fillStyle = this.edge;
    ctx.fillRect(this.x, this.y, this.w, 4);
    ctx.fillRect(this.x, this.y + this.h - 4, this.w, 4);
    ctx.restore();
  }
}

/* ----------------------------- Coins ------------------------------------ */
const COIN_TYPES = {
  bronze:   { value: 1,  r: 11, color: "#cd7f32", shine: "#f0b070", rare: 0.55 },
  silver:   { value: 5,  r: 12, color: "#c0c0c0", shine: "#ffffff", rare: 0.25 },
  gold:     { value: 10, r: 13, color: "#ffd700", shine: "#fff6a0", rare: 0.14 },
  mega:     { value: 25, r: 16, color: "#ff4fd8", shine: "#ffd0f5", rare: 0.06, magnet: 150 },
  rainbow:  { value: 50, r: 15, color: "#ff0000", shine: "#ffffff", rare: 0 }
};
function pickCoinType() {
  const r = Math.random();
  let acc = 0;
  for (const k of ["bronze", "silver", "gold", "mega"]) {
    acc += COIN_TYPES[k].rare;
    if (r <= acc) return k;
  }
  return "bronze";
}
class Coin {
  constructor(x, y, type) {
    this.type = type || pickCoinType();
    const t = COIN_TYPES[this.type];
    this.x = x; this.y = y; this.r = t.r;
    this.w = t.r * 2; this.h = t.r * 2;
    this.vx = 0; this.vy = rand(-0.2, 0.05);
    this.landed = false;
    this.collected = false;
    this.dead = false;
    this.spin = rand(0, Math.PI * 2);
    this.hue = 0;
    this.spawnScale = 0;       // grow-in animation
    this.respawnTimer = -1;
    this.flying = false;        // tween to HUD
    this.tween = 0;
    this.bobPhase = rand(0, Math.PI * 2);
  }
  isAlive() { return !this.dead; }
  get cx() { return this.x; }
  get cy() { return this.y; }
  // bounding box for AABB uses center
  get bx() { return this.x - this.r; }
  get by() { return this.y - this.r; }
  collide(platforms) {
    if (this.landed) return;
    const t = COIN_TYPES[this.type];
    this.vy += GRAVITY * dt0 * 1;
    this.y += this.vy * dt0;
    for (const p of platforms) {
      if (this.x > p.x && this.x < p.x + p.w &&
          this.y + this.r > p.y && this.y + this.r < p.y + p.h + 30 && this.vy > 0) {
        this.y = p.y - this.r;
        this.vy *= -0.5;
        if (Math.abs(this.vy) < 0.05) { this.vy = 0; this.landed = true; }
      }
    }
    if (this.y > WORLD_H + 100) { this.dead = true; }
  }
  update(dt, game) {
    this.spin += dt * 0.004;
    this.hue = (this.hue + dt * 0.4) % 360;
    this.bobPhase += dt * 0.004;
    if (this.spawnScale < 1) this.spawnScale = clamp(this.spawnScale + dt * 0.004, 0, 1);

    if (this.respawnTimer > 0) {
      this.respawnTimer -= dt;
      if (this.respawnTimer <= 0) {
        this.collected = false; this.spawnScale = 0;
        this.landed = false; this.vy = rand(-0.2, 0);
      }
      return;
    }
    if (this.flying) {
      this.tween += dt * 0.004;
      if (this.tween >= 1) { this.flying = false; this.dead = false; this.collected = true; }
      return;
    }
    if (this.collected) return;

    // gravity/bounce
    this.collide(game.platforms);
  }
  draw(ctx) {
    if (this.collected && !this.flying) return;
    const t = COIN_TYPES[this.type];
    const bob = this.landed ? Math.sin(this.bobPhase) * 2 : 0;
    const sc = this.spawnScale;
    ctx.save();
    ctx.translate(this.x, this.y + bob);
    ctx.scale(sc, sc);
    // rotation effect: squash horizontally for spin
    const sx = Math.abs(Math.cos(this.spin)) * 0.7 + 0.3;
    ctx.scale(sx, 1);
    let col = t.color, shine = t.shine;
    if (this.type === "rainbow") {
      col = "hsl(" + this.hue + ",90%,55%)";
      shine = "hsl(" + ((this.hue + 60) % 360) + ",90%,80%)";
    }
    // body
    ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI * 2);
    ctx.fillStyle = col; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = shine; ctx.stroke();
    // inner highlight
    ctx.beginPath(); ctx.arc(-this.r * 0.25, -this.r * 0.25, this.r * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = shine; ctx.globalAlpha = 0.7; ctx.fill(); ctx.globalAlpha = 1;
    // value pip
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.font = "bold " + Math.round(this.r) + "px sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(this.type === "mega" ? "★" : (this.type === "rainbow" ? "✦" : ""), 0, 1);
    ctx.restore();
    // mega glow
    if (this.type === "mega") {
      ctx.save(); ctx.globalAlpha = 0.25 + Math.sin(this.spin * 2) * 0.1;
      ctx.beginPath(); ctx.arc(this.x, this.y + bob, this.r * 1.8, 0, Math.PI * 2);
      ctx.fillStyle = "#ff4fd8"; ctx.fill(); ctx.restore();
    }
  }
}
let dt0 = 16; // shared dt for coin.collide convenience (set each frame)

/* ----------------------------- Projectiles ------------------------------ */
class Projectile {
  constructor(x, y, vx, vy, opts) {
    opts = opts || {};
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.r = opts.r || 10; this.w = this.r * 2; this.h = this.r * 2;
    this.dead = false;
    this.gravity = opts.gravity || 0;
    this.life = opts.life || 5000;
    this.fromBoss = !!opts.fromBoss;
    this.damage = opts.damage || 1;
    this.color = opts.color || "#ff7b00";
    this.feather = !!opts.feather;
  }
  isAlive() { return !this.dead; }
  get bx() { return this.x - this.r; }
  get by() { return this.y - this.r; }
  update(dt, game) {
    this.life -= dt;
    if (this.life <= 0) { this.dead = true; return; }
    this.vy += this.gravity * dt;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    // clip against walls/floor so boss can't shoot through walls
    if (this.x < -40 || this.x > WORLD_W + 40 || this.y > WORLD_H + 40 || this.y < -200) {
      this.dead = true;
    }
  }
  draw(ctx) {
    ctx.save();
    if (this.feather) {
      ctx.translate(this.x, this.y);
      ctx.rotate(Math.atan2(this.vy, this.vx));
      ctx.fillStyle = "#e8d8b0";
      ctx.beginPath();
      ctx.ellipse(0, 0, this.r * 1.4, this.r * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#b09060"; ctx.beginPath();
      ctx.moveTo(-this.r * 1.4, 0); ctx.lineTo(this.r * 1.4, 0); ctx.stroke();
    } else {
      const g = ctx.createRadialGradient(this.x, this.y, 1, this.x, this.y, this.r);
      g.addColorStop(0, "#fff3b0"); g.addColorStop(0.5, this.color); g.addColorStop(1, "rgba(255,80,0,0)");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }
}

/* ----------------------------- Hazards ---------------------------------- */
// Lava bubble (L2), Shockwave ring (boss), Fire patch (boss), Meteor (boss), DangerZone overlay
class Shockwave {
  constructor(x, y) { this.x = x; this.y = y; this.r = 10; this.maxR = 380; this.dead = false; this.hitDone = false; }
  isAlive() { return !this.dead; }
  update(dt) { this.r += dt * 0.7; if (this.r > this.maxR) this.dead = true; }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = clamp(1 - this.r / this.maxR, 0, 1);
    ctx.strokeStyle = "#ffaa33"; ctx.lineWidth = 12;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.stroke();
    ctx.strokeStyle = "#ff5500"; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }
}
class FirePatch {
  constructor(x, y, w) { this.x = x; this.y = y; this.w = w; this.h = 14; this.life = 5000; this.dead = false; }
  isAlive() { return !this.dead; }
  update(dt, game) {
    this.life -= dt; if (this.life <= 0) this.dead = true;
    if (Math.random() < 0.5) game.particles.emit({
      x: this.x + rand(0, this.w), y: this.y, count: 1, angle: -Math.PI / 2, spread: 0.5,
      speedMin: 0.05, speedMax: 0.15, lifeMin: 300, lifeMax: 600,
      color: () => ["#ff3300", "#ff8800", "#ffcc00"][randi(0, 2)], sizeMin: 3, sizeMax: 7, gravity: -0.0002
    });
  }
  draw(ctx) {
    ctx.save(); ctx.globalAlpha = clamp(this.life / 5000, 0.2, 1);
    ctx.fillStyle = "#cc2200"; ctx.fillRect(this.x, this.y, this.w, this.h);
    ctx.restore();
  }
}
class LavaBubble {
  constructor(x, groundY) {
    this.x = x; this.groundY = groundY; this.y = groundY;
    this.warn = 1000; this.active = false; this.vy = -0.7;
    this.r = 18; this.w = 36; this.h = 36; this.dead = false; this.life = 1600;
  }
  isAlive() { return !this.dead; }
  get bx() { return this.x - this.r; }
  get by() { return this.y - this.r; }
  update(dt) {

    this.vy += GRAVITY * dt;
    this.y += this.vy * dt;

  }
  draw(ctx) {
    if (this.warn > 0) {
      ctx.save();
      ctx.globalAlpha = 0.4 + Math.sin(this.warn * 0.02) * 0.3;
      ctx.fillStyle = "#ff3300";
      ctx.beginPath(); ctx.arc(this.x, this.groundY, this.r * 1.1, Math.PI, Math.PI * 2); ctx.fill();

    g.addColorStop(0, "#ffdd55"); g.addColorStop(0.6, "#ff6600"); g.addColorStop(1, "#cc2200");
